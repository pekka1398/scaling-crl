# Hydra submitit launcher config for SLURM.
#
# Usage:
#   python train.py -m experiment=ant_d8_s2000,ant_d32_s2000 hydra/launcher=submitit_slurm
#   python train.py -m experiment=ant_d8_s2000 hydra/launcher=submitit_slurm hydra.launcher.partition=dev

defaults:
  - submitit_slurm

submitit_folder: ${hydra.sweep.dir}/.submitit

# SLURM settings
partition: 8gpus
gres: gpu:1
cpus_per_task: 1
mem_gb: 200
timeout_min: 2880  # 48 hours
account: MST114560

# One GPU per experiment
tasks_per_node: 1
nodes: 1

# Environment setup (runs before train.py)
setup:
  - "cd /home/u2169145/code/scaling-crl"
  - 'NVIDIA_LIBS=$(find .venv -path "*/nvidia/*/lib" -type d | tr "\n" ":")'
  - "export LD_LIBRARY_PATH=${NVIDIA_LIBS}${LD_LIBRARY_PATH}"
  - "export XLA_PYTHON_CLIENT_PREALLOCATE=false"
  - "export XLA_PYTHON_CLIENT_ALLOCATOR=platform"
  - "export JAX_COMPILATION_CACHE_DIR=/home/u2169145/.cache/jax"
